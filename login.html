<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ditto | Connect Node</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, Roboto, sans-serif; }
    body { background: #050510; color: white; min-height: 100vh; overflow-x: hidden; display: flex; flex-direction: column; }
    
    .bg {
      position: fixed; inset: 0; z-index: -2;
      background: radial-gradient(circle at 20% 20%, #8b5cf6, transparent 25%), radial-gradient(circle at 80% 30%, #06b6d4, transparent 25%), radial-gradient(circle at 50% 90%, #10b981, transparent 25%);
      filter: blur(80px); animation: bgMove 8s infinite alternate ease-in-out;
    }
    @keyframes bgMove { 100% { transform: scale(1.1); } }
    .light { position: fixed; width: 250px; height: 250px; background: rgba(255, 255, 255, 0.08); border-radius: 50%; filter: blur(80px); pointer-events: none; z-index: -1; }

    nav {
      height: 80px; display: flex; justify-content: space-between; align-items: center; padding: 0 8%;
      background: rgba(5, 5, 16, 0.5); backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px);
      position: sticky; top: 0; z-index: 10; border-bottom: 1px solid rgba(255, 255, 255, 0.05);
    }
    .logo { font-size: 32px; font-weight: 900; background: linear-gradient(90deg, #a855f7, #06b6d4, #10b981); -webkit-background-clip: text; -webkit-text-fill-color: transparent; cursor: pointer; }
    .nav-links button { padding: 10px 22px; border-radius: 30px; border: 1px solid rgba(255, 255, 255, 0.1); background: rgba(255, 255, 255, 0.03); color: white; cursor: pointer; transition: all 0.3s; }
    .nav-links button:hover { background: #10b981; box-shadow: 0 0 20px rgba(16, 185, 129, 0.5); transform: translateY(-2px); }

    section { flex: 1; display: flex; align-items: center; justify-content: center; padding: 40px 20px; }
    .card {
      background: rgba(255, 255, 255, 0.03); padding: 40px; border-radius: 24px; border: 1px solid rgba(255, 255, 255, 0.07);
      backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px); box-shadow: 0 20px 50px rgba(0,0,0,0.5);
      max-width: 450px; width: 100%; animation: fadeIn 0.5s ease-out;
    }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }

    h1 { font-size: 32px; font-weight: 800; margin-bottom: 8px; letter-spacing: -0.5px; }
    p { color: #94a3b8; font-size: 14px; margin-bottom: 24px; }
    
    input {
      width: 100%; padding: 14px; border-radius: 12px; margin-bottom: 14px;
      background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1);
      color: white; font-size: 15px; outline: none; transition: border-color 0.3s;
    }
    input:focus { border-color: #06b6d4; background: rgba(255, 255, 255, 0.08); }

    .btn {
      width: 100%; padding: 15px; border-radius: 40px; border: none; font-size: 16px; font-weight: 600;
      background: linear-gradient(90deg, #8b5cf6, #06b6d4); color: white; cursor: pointer; transition: all 0.3s;
    }
    .btn:hover { transform: translateY(-2px); box-shadow: 0 10px 25px rgba(139, 92, 246, 0.4); }

    .auth-footer { display: flex; justify-content: space-between; margin-top: 20px; font-size: 13px; color: #94a3b8; }
    .auth-link { color: #06b6d4; cursor: pointer; font-weight: 500; }
    .auth-link:hover { text-decoration: underline; }
    .auth-view { display: none; }
    .auth-view.active { display: block; }
  </style>
</head>
<body>

  <div class="bg" aria-hidden="true"></div>
  <div class="light" id="cursor-glow" aria-hidden="true"></div>

  <nav>
    <div class="logo" onclick="window.location.href='index.html'">Ditto.</div>
    <div class="nav-links">
      <button onclick="window.location.href='index.html'">Home</button>
    </div>
  </nav>

  <section>
    <div class="card">
      <div id="view-login" class="auth-view active">
        <h1>Welcome Back</h1>
        <p>Connect with your Ditto.</p>
        <input id="login-email" type="email" placeholder="Email Address">
        <input id="login-password" type="password" placeholder="Password">
        <button class="btn" onclick="handleAuthSubmit('login')">Authorize Access</button>
        <div class="auth-footer">
          <span class="auth-link" onclick="toggleAuthMode('forgot')">Forgot Password?</span>
          <span>New? <span class="auth-link" onclick="toggleAuthMode('signup')">Find My Ditto</span></span>
        </div>
      </div>

      <div id="view-signup" class="auth-view">
        <h1>Create Account</h1>
        <p>Initialize your custom digital personality workspace.</p>
        <input id="username" type="text" placeholder="Desired Mind ID Handle">
        <input id="email" type="email" placeholder="Email Address">
        <input id="password" type="password" placeholder="Secure Password">
        <button class="btn" onclick="handleAuthSubmit('signup')">Register Mind Account</button>
        <div class="auth-footer">
          <span>Already registered?</span>
          <span class="auth-link" onclick="toggleAuthMode('login')">Access Account</span>
        </div>
      </div>

      <div id="view-forgot" class="auth-view">
        <h1>Recover Stream</h1>
        <p>Request an encrypted credential adjustment link.</p>
        <input id="forgot-email" type="email" placeholder="Your Registration Email">
        <button class="btn" onclick="handleAuthSubmit('forgot')">Send Reset Path</button>
        <div class="auth-footer" style="justify-content: center;">
          <span class="auth-link" onclick="toggleAuthMode('login')">Return to Sign In</span>
        </div>
      </div>
    </div>
  </section>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";
    import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, sendPasswordResetEmail, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-auth.js";

    const firebaseConfig = {
      apiKey: "AIzaSyCRU2XnvDbSMKlOqAMijcUGYPC4RKg9nPM",
      authDomain: "dittoweb.firebaseapp.com",
      projectId: "dittoweb",
      storageBucket: "dittoweb.firebasestorage.app",
      messagingSenderId: "902164300349",
      appId: "1:902164300349:web:307e58ba6e3e9dbc33a054"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    window.toggleAuthMode = function(mode) {
      document.querySelectorAll('.auth-view').forEach(v => v.classList.remove('active'));
      document.getElementById(`view-${mode}`).classList.add('active');
    };

    window.handleAuthSubmit = async function(type) {
      if (type === 'signup') {
        const uName = document.getElementById('username').value.trim();
        const email = document.getElementById('email').value.trim();
        const password = document.getElementById('password').value.trim();
        if (!uName || !email || !password) { alert('Fill in all workspace configuration fields.'); return; }
        try {
          const res = await createUserWithEmailAndPassword(auth, email, password);
          localStorage.setItem(`userName_${res.user.uid}`, uName);
          localStorage.setItem(`userLikes_${res.user.uid}`, "0");
          localStorage.setItem(`userConnections_${res.user.uid}`, "0");
        } catch (e) { alert(e.message); }
      } 
      else if (type === 'login') {
        const email = document.getElementById('login-email').value.trim();
        const password = document.getElementById('login-password').value.trim();
        try { await signInWithEmailAndPassword(auth, email, password); } catch (e) { alert(e.message); }
      }
      else if (type === 'forgot') {
        const email = document.getElementById('forgot-email').value.trim();
        try { await sendPasswordResetEmail(auth, email); alert('Reset link transmitted successfully.'); toggleAuthMode('login'); } catch (e) { alert(e.message); }
      }
    };

    onAuthStateChanged(auth, (user) => { if (user) window.location.href = "profiles.html"; });

    const glow = document.getElementById("cursor-glow");
    let cX = 0, cY = 0;
    window.addEventListener("mousemove", (e) => {
      cX = e.clientX - 125; cY = e.clientY - 125;
      requestAnimationFrame(() => { glow.style.transform = `translate3d(${cX}px, ${cY}px, 0)`; });
    });
  </script>
</body>
</html>
