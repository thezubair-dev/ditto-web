<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ditto | Profile Node</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, Roboto, sans-serif;
    }

    body {
      background: #050510;
      color: white;
      min-height: 100vh;
      overflow-x: hidden;
    }

    .bg {
      position: fixed;
      inset: 0;
      z-index: -2;
      background: 
        radial-gradient(circle at 20% 20%, #8b5cf6, transparent 25%),
        radial-gradient(circle at 80% 30%, #06b6d4, transparent 25%),
        radial-gradient(circle at 50% 90%, #10b981, transparent 25%);
      filter: blur(80px);
      animation: bgMove 8s infinite alternate ease-in-out;
    }

    @keyframes bgMove {
      100% { transform: scale(1.1); }
    }

    .light {
      position: fixed;
      width: 250px;
      height: 250px;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 50%;
      filter: blur(80px);
      pointer-events: none;
      z-index: -1;
      top: 0;
      left: 0;
      will-change: transform;
    }

    nav {
      height: 80px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0 8%;
      background: rgba(255, 255, 255, 0.04);
      backdrop-filter: blur(25px);
      -webkit-backdrop-filter: blur(25px);
      position: sticky;
      top: 0;
      z-index: 10;
      border-bottom: 1px solid rgba(255, 255, 255, 0.05);
    }

    .logo {
      font-size: 32px;
      font-weight: 900;
      background: linear-gradient(90deg, #a855f7, #06b6d4, #10b981);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      color: transparent;
      cursor: pointer;
    }

    .nav-links {
      display: flex;
      gap: 10px;
    }

    .nav-links button {
      padding: 10px 22px;
      border-radius: 30px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      background: rgba(255, 255, 255, 0.03);
      color: white;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
    }

    .nav-links button:hover {
      background: #10b981;
      border-color: transparent;
      box-shadow: 0 0 20px rgba(16, 185, 129, 0.5);
      transform: translateY(-3px);
    }

    .nav-links button.active-nav {
      background: rgba(255, 255, 255, 0.12);
      border-color: #06b6d4;
    }

    section {
      display: none;
      padding: 40px 8%;
      min-height: calc(100vh - 80px);
    }

    section.active {
      display: grid;
      animation: fadeIn 0.4s forwards ease-out;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(15px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .centered-layout {
      display: flex;
      flex-direction: column;
      align-items: center;
      max-width: 650px;
      margin: 0 auto;
      width: 100%;
    }

    h1 { font-size: 40px; margin-bottom: 15px; letter-spacing: -0.5px; }
    p { color: #b3b3b3; font-size: 16px; margin: 15px 0; line-height: 1.6; }
    h2 { font-size: 24px; margin-bottom: 10px; }

    .btn {
      display: inline-block;
      padding: 14px 30px;
      border-radius: 40px;
      border: none;
      font-size: 16px;
      font-weight: 600;
      background: linear-gradient(90deg, #8b5cf6, #06b6d4);
      color: white;
      cursor: pointer;
      transition: all 0.3s ease;
      text-align: center;
    }

    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 25px rgba(139, 92, 246, 0.4);
    }

    .btn-secondary {
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.15);
    }
    .btn-secondary:hover {
      background: rgba(255, 255, 255, 0.15);
      box-shadow: 0 10px 20px rgba(255, 255, 255, 0.05);
    }

    .card {
      background: rgba(255, 255, 255, 0.05);
      padding: 30px;
      border-radius: 24px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      box-shadow: 0 20px 40px rgba(0,0,0,0.4);
      transition: all 0.3s ease;
      width: 100%;
    }

    input, textarea {
      width: 100%; padding: 14px; border-radius: 12px; margin: 10px 0;
      background: rgba(255, 255, 255, 0.06); border: 1px solid rgba(255, 255, 255, 0.12);
      color: white; font-size: 15px; outline: none; transition: border-color 0.3s;
    }
    input:focus, textarea:focus { border-color: #06b6d4; }
  </style>
</head>
<body>

  <div class="bg" aria-hidden="true"></div>
  <div class="light" id="cursor-glow" aria-hidden="true"></div>

  <nav>
    <div class="logo" onclick="window.location.href='index.html'">Ditto.</div>
    <div class="nav-links">
      <button onclick="window.location.href='index.html'" id="nav-home">Home</button>
      <button onclick="window.location.href='thoughts.html'" id="nav-feed">Thoughts</button>
      <button onclick="window.location.href='dittos.html'" id="nav-dittos">Dittos</button>
      <button onclick="window.location.href='profile.html'" id="nav-profile" class="active-nav">Profile</button>
    </div>
  </nav>

  <section id="profile" class="active">
    <div class="centered-layout" style="max-width: 700px;">
      <div class="card" id="profile-card-content">
        </div>
    </div>
  </section>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";
    import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-auth.js";

    const firebaseConfig = {
      apiKey: "AIzaSyCRU2XnvDbSMKlOqAMijcUGYPC4RKg9nPM",
      authDomain: "dittoweb.firebaseapp.com",
      projectId: "dittoweb",
      storageBucket: "dittoweb.firebasestorage.app",
      messagingSenderId: "902164300349",
      appId: "1:902164300349:web:307e58ba6e3e9dbc33a054",
      measurementId: "G-JP34BSJ3RB"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    let localDB = {
      users: {}
    };

    let sessionUser = null;

    onAuthStateChanged(auth, (user) => {
      if (!user) {
        alert("Please login first.");
        window.location.href = 'login.html';
        return;
      }
      sessionUser = user;
      const localSaved = localStorage.getItem(`userVector_${user.uid}`);
      if (!localDB.users[user.uid]) {
        localDB.users[user.uid] = { uid: user.uid, name: user.email.split('@')[0], avatar: "👤", traitVector: null, moodVector: null, bio: "System Node User", likesCount: 0 };
      }
      if (localSaved) {
        const parsing = JSON.parse(localSaved);
        localDB.users[user.uid].traitVector = parsing.trait;
        localDB.users[user.uid].moodVector = parsing.mood;
      }
      syncProfileSettingsUI();
    });

    function syncProfileSettingsUI() {
      const card = document.getElementById('profile-card-content');
      const u = localDB.users[sessionUser.uid];
      if(!u.traitVector) {
        card.innerHTML = `
          <h2>Profile Configuration Incomplete</h2>
          <p>Your matching matrix array parameters are entirely empty.</p>
          <button class="btn" onclick="window.location.href='login.html'">Run 10-Question Core Profiler Now</button>`;
      } else {
        card.innerHTML = `
          <div style="display:flex; align-items:center; gap:20px;">
            <div style="font-size:50px;">${u.avatar}</div>
            <div><h2>${u.name}</h2><p style="color:#10b981;">✓ Mind Profile Vector Calibrated</p></div>
          </div>
          <hr style="border:0; border-top:1px solid rgba(255,255,255,0.1); margin:20px 0;">
          <label>Update Display Handle Name</label>
          <input id="edit-display-name" type="text" value="${u.name}">
          <button class="btn" style="width:100%; margin-top:10px;" onclick="saveProfileOverride()">Save Updates</button>
          <button class="btn btn-secondary" style="width:100%; margin-top:10px;" onclick="logoutSession()">Terminate Session Instance</button>`;
      }
    }

    window.saveProfileOverride = function() {
      const n = document.getElementById('edit-display-name').value.trim();
      if(n) { localDB.users[sessionUser.uid].name = n; alert("Profile updated!"); syncProfileSettingsUI(); }
    };

    window.logoutSession = async function() {
      await signOut(auth); sessionUser = null; alert('Session ended.'); window.location.href = 'index.html';
    };

    const glow = document.getElementById("cursor-glow"); let cX = 0, cY = 0;
    window.addEventListener("mousemove", (e) => {
      cX = e.clientX - 125; cY = e.clientY - 125;
      requestAnimationFrame(() => { glow.style.transform = `translate3d(${cX}px, ${cY}px, 0)`; });
    });
  </script>
</body>
</html>
