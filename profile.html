<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ditto | Profile Node</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, Roboto, sans-serif;
    }

    body {
      background: #050510;
      color: white;
      min-height: 100vh;
      overflow-x: hidden;
    }

    .bg {
      position: fixed;
      inset: 0;
      z-index: -2;
      background: 
        radial-gradient(circle at 20% 20%, #8b5cf6, transparent 25%),
        radial-gradient(circle at 80% 30%, #06b6d4, transparent 25%),
        radial-gradient(circle at 50% 90%, #10b981, transparent 25%);
      filter: blur(80px);
      animation: bgMove 8s infinite alternate ease-in-out;
    }

    @keyframes bgMove {
      100% { transform: scale(1.1); }
    }

    .light {
      position: fixed;
      width: 250px;
      height: 250px;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 50%;
      filter: blur(80px);
      pointer-events: none;
      z-index: -1;
      top: 0;
      left: 0;
      will-change: transform;
    }

    nav {
      height: 80px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0 8%;
      background: rgba(255, 255, 255, 0.04);
      backdrop-filter: blur(25px);
      -webkit-backdrop-filter: blur(25px);
      position: sticky;
      top: 0;
      z-index: 10;
      border-bottom: 1px solid rgba(255, 255, 255, 0.05);
    }

    .logo {
      font-size: 32px;
      font-weight: 900;
      background: linear-gradient(90deg, #a855f7, #06b6d4, #10b981);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      color: transparent;
      cursor: pointer;
    }

    .nav-links {
      display: flex;
      gap: 10px;
    }

    .nav-links button {
      padding: 10px 22px;
      border-radius: 30px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      background: rgba(255, 255, 255, 0.03);
      color: white;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
    }

    .nav-links button:hover {
      background: #10b981;
      border-color: transparent;
      box-shadow: 0 0 20px rgba(16, 185, 129, 0.5);
      transform: translateY(-3px);
    }

    .nav-links button.active-nav {
      background: rgba(255, 255, 255, 0.12);
      border-color: #06b6d4;
    }

    section {
      display: grid;
      padding: 40px 8%;
      min-height: calc(100vh - 80px);
    }

    .centered-layout {
      display: flex;
      flex-direction: column;
      align-items: center;
      max-width: 700px;
      margin: 0 auto;
      width: 100%;
    }

    h1 { font-size: 36px; margin-bottom: 15px; letter-spacing: -0.5px; }
    p { color: #b3b3b3; font-size: 16px; margin: 10px 0; line-height: 1.6; }
    h2 { font-size: 24px; margin-bottom: 12px; }
    h3 { font-size: 18px; color: #f1f5f9; margin-bottom: 10px; }

    .btn {
      display: inline-block;
      padding: 14px 30px;
      border-radius: 40px;
      border: none;
      font-size: 16px;
      font-weight: 600;
      background: linear-gradient(90deg, #8b5cf6, #06b6d4);
      color: white;
      cursor: pointer;
      transition: all 0.3s ease;
      text-align: center;
    }

    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 25px rgba(139, 92, 246, 0.4);
    }

    .btn-secondary {
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.15);
    }
    .btn-secondary:hover {
      background: rgba(255, 255, 255, 0.15);
      box-shadow: 0 10px 20px rgba(255, 255, 255, 0.05);
    }

    .card {
      background: rgba(255, 255, 255, 0.05);
      padding: 35px;
      border-radius: 24px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      box-shadow: 0 20px 40px rgba(0,0,0,0.4);
      width: 100%;
      animation: fadeIn 0.4s forwards ease-out;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(15px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .avatar-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
      margin-bottom: 20px;
    }

    .avatar-selectable {
      font-size: 40px; padding: 12px; border-radius: 16px;
      background: rgba(255,255,255,0.03); border: 2px solid transparent;
      cursor: pointer; transition: all 0.2s; text-align: center;
    }
    .avatar-selectable:hover { background: rgba(255,255,255,0.08); transform: scale(1.05); }
    .avatar-selectable.selected { border-color: #06b6d4; background: rgba(6, 182, 212, 0.1); }

    input, textarea {
      width: 100%; padding: 14px; border-radius: 12px; margin: 10px 0;
      background: rgba(255, 255, 255, 0.06); border: 1px solid rgba(255, 255, 255, 0.12);
      color: white; font-size: 15px; outline: none; transition: border-color 0.3s;
    }
    input:focus, textarea:focus { border-color: #06b6d4; }

    label { display: block; font-size: 14px; color: #a3a3a3; margin-top: 10px; }

    /* Quiz Elements */
    .quiz-container { width: 100%; margin-top: 15px; }
    .quiz-item { display: none; }
    .quiz-item.active { display: block; }
    .options-grid { display: flex; flex-direction: column; gap: 12px; margin-top: 15px; }
    
    .option-btn {
      width: 100%; padding: 15px 20px; border-radius: 14px; text-align: left;
      background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08);
      color: white; font-size: 15px; cursor: pointer; transition: all 0.2s;
    }
    .option-btn:hover { background: rgba(255,255,255,0.08); border-color: #8b5cf6; padding-left: 25px; }
    .option-btn.selected { background: rgba(139, 92, 246, 0.2); border-color: #8b5cf6; }
    
    .progress-bar-container { width: 100%; height: 6px; background: rgba(255,255,255,0.1); border-radius: 3px; margin-bottom: 20px; overflow: hidden; }
    .progress-bar-fill { height: 100%; width: 0%; background: linear-gradient(90deg, #8b5cf6, #06b6d4); transition: width 0.3s; }

    /* Cross-Device Optimization Matrix */
    @media (max-width: 768px) {
      nav {
        height: auto;
        flex-direction: column;
        padding: 15px 4%;
        gap: 15px;
      }
      .nav-links {
        width: 100%;
        justify-content: center;
        flex-wrap: wrap;
        gap: 8px;
      }
      .nav-links button {
        padding: 8px 16px;
        font-size: 14px;
        flex: 1 1 auto;
        text-align: center;
      }
      section { padding: 20px 4%; }
      h1 { font-size: 28px; }
      h2 { font-size: 20px; }
      .card { padding: 20px; border-radius: 20px; }
      .avatar-grid { grid-template-columns: repeat(4, 1fr); gap: 8px; }
      .avatar-selectable { font-size: 30px; padding: 8px; }
      .option-btn { padding: 12px 16px; font-size: 14px; }
    }
  </style>
</head>
<body>

  <div class="bg" aria-hidden="true"></div>
  <div class="light" id="cursor-glow" aria-hidden="true"></div>

  <nav>
    <div class="logo" onclick="window.location.href='index.html'">Ditto.</div>
    <div class="nav-links">
      <button onclick="window.location.href='index.html'" id="nav-home">Home</button>
      <button onclick="window.location.href='thoughts.html'" id="nav-feed">Thoughts</button>
      <button onclick="window.location.href='dittos.html'" id="nav-dittos">Dittos</button>
      <button onclick="window.location.href='profile.html'" id="nav-profile" class="active-nav">Profile</button>
    </div>
  </nav>

  <section>
    <div class="centered-layout">
      <div class="card" id="profile-container-root">
        <h2 style="text-align: center; color: #a3a3a3;">Validating Consciousness Connection Link...</h2>
      </div>
    </div>
  </section>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";
    import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-auth.js";

    const firebaseConfig = {
      apiKey: "AIzaSyCRU2XnvDbSMKlOqAMijcUGYPC4RKg9nPM",
      authDomain: "dittoweb.firebaseapp.com",
      projectId: "dittoweb",
      storageBucket: "dittoweb.firebasestorage.app",
      messagingSenderId: "902164300349",
      appId: "1:902164300349:web:307e58ba6e3e9dbc33a054",
      measurementId: "G-JP34BSJ3RB"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    
    let localDB = { users: {} };
    let sessionUser = null;
    let selectedAvatarOnboarding = "";
    let onboardingAnswers = {};

    const QUESTION_DATA = [
      { q: "When you've had a long or tiring day, what helps you feel better?", type: "scale", opts: ["Talking to people about it", "Being alone in silence", "A bit of both, depends on the day", "Doing something active alone, like walking or listening to music"], vals: [1.0, 0.0, 0.5, 0.3] },
      { q: "When you are feeling low or upset, what do you usually do first?", type: "one-hot", slots: 4, opts: ["Talk to someone about what I'm feeling", "Distract myself with something else, like scrolling or watching something", "Sit alone with the feeling and think it through", "Keep myself busy so I don't have to think about it"] },
      { q: "How often do small problems or setbacks ruin your mood for the whole day?", type: "scale", opts: ["Almost every time", "Quite often", "Rarely", "Almost never"], vals: [1.0, 0.66, 0.33, 0.0] },
      { q: "What kind of conversation do you enjoy the most?", type: "scale", opts: ["Deep talks about life, meaning, or big ideas", "Practical talks about plans, goals, or real problems", "Light and fun talks, jokes, random topics", "It depends completely on my mood that day"], vals: [1.0, 0.5, 0.3, 0.5] },
      { q: "When a friend shares a problem with you, what do you naturally do?", type: "one-hot", slots: 4, opts: ["Just listen and make them feel understood", "Try to give advice or solutions", "Share a similar experience I've been through", "Ask more questions to understand them better"] },
      { q: "When you share something personal, what do you want from the other person?", type: "one-hot", slots: 4, opts: ["For them to say 'I understand' or 'me too'", "For them to question or challenge my thinking", "Nothing really, I just want to express it", "For them to ask more about how I feel"] },
      { q: "How often do you feel like no one really understands you?", type: "scale", opts: ["Very often", "Sometimes", "Rarely", "Almost never"], vals: [1.0, 0.66, 0.33, 0.0] },
      { q: "Right now in your life, what matters to you the most?", type: "one-hot", slots: 5, opts: ["Feeling connected to people", "Growing and achieving things", "Having freedom and independence", "Feeling safe and secure", "Finding meaning or purpose in life"] },
      { q: "When you disagree with someone, what do you usually do?", type: "one-hot", slots: 4, opts: ["Avoid the conflict and let it go", "Say what I think, even if it creates tension", "Try to find a middle ground", "Agree with them just to keep the peace"] },
      { q: "Right now, how are you feeling?", type: "mood", slots: 8, opts: ["Excited", "Anxious", "Content", "Lonely", "Hopeful", "Numb", "Motivated", "Overwhelmed"] }
    ];

    // Core Gatekeeper Engine
    onAuthStateChanged(auth, (user) => {
      if (!user) {
        alert("Please login first.");
        window.location.href = 'index.html'; // Fallback redirect to gateway entry point
        return;
      }
      
      sessionUser = user;
      const localSaved = localStorage.getItem(`userVector_${user.uid}`);
      
      if (!localDB.users[user.uid]) {
        localDB.users[user.uid] = { uid: user.uid, name: user.email.split('@')[0], avatar: "👤", traitVector: null, moodVector: null, bio: "System Node User" };
      }
      
      if (localSaved) {
        const parsing = JSON.parse(localSaved);
        localDB.users[user.uid].traitVector = parsing.trait;
        localDB.users[user.uid].moodVector = parsing.mood;
        if(localStorage.getItem(`userAvatar_${user.uid}`)) localDB.users[user.uid].avatar = localStorage.getItem(`userAvatar_${user.uid}`);
        if(localStorage.getItem(`userName_${user.uid}`)) localDB.users[user.uid].name = localStorage.getItem(`userName_${user.uid}`);
        executeProfileUIRender();
      } else {
        executeQuizEmbeddedRender();
      }
    });

    // Render Form Route A: Fully Calibrated Interface
    function executeProfileUIRender() {
      const root = document.getElementById('profile-container-root');
      const u = localDB.users[sessionUser.uid];
      root.innerHTML = `
        <div style="display:flex; align-items:center; gap:20px;">
          <div style="font-size:50px; text-shadow: 0 0 10px rgba(255,255,255,0.2);">${u.avatar}</div>
          <div>
            <h2>${u.name}</h2>
            <p style="color:#10b981; margin:0; font-size:14px; font-weight:600;">✓ Cognitive Calibration Active</p>
          </div>
        </div>
        <hr style="border:0; border-top:1px solid rgba(255,255,255,0.1); margin:20px 0;">
        
        <label>Update Matrix Handle Identifier</label>
        <input id="edit-display-name" type="text" value="${u.name}">
        
        <button class="btn" style="width:100%; margin-top:15px;" onclick="saveProfileOverride()">Save Updates</button>
        <button class="btn btn-secondary" style="width:100%; margin-top:10px;" onclick="logoutSession()">Terminate Session Instance</button>
      `;
    }

    // Render Form Route B: Direct Quiz Assembly Engine
    function executeQuizEmbeddedRender() {
      const root = document.getElementById('profile-container-root');
      root.innerHTML = `
        <div id="setup-meta-step">
          <h1>Complete Profile Setup</h1>
          <p>Before entering the networks, you must choose an avatar node asset and run the 10 core logic questions.</p>
          
          <h3 style="margin-top:20px;">Select Avatar Node Asset</h3>
          <div class="avatar-grid">
            <div class="avatar-selectable" onclick="selectAvatar(this, '🧠')">🧠</div>
            <div class="avatar-selectable" onclick="selectAvatar(this, '🎨')">🎨</div>
            <div class="avatar-selectable" onclick="selectAvatar(this, '🚀')">🚀</div>
            <div class="avatar-selectable" onclick="selectAvatar(this, '🌙')">🌙</div>
            <div class="avatar-selectable" onclick="selectAvatar(this, '🔍')">🔍</div>
            <div class="avatar-selectable" onclick="selectAvatar(this, '⚡')">⚡</div>
            <div class="avatar-selectable" onclick="selectAvatar(this, '🍀')">🍀</div>
            <div class="avatar-selectable" onclick="selectAvatar(this, '🎭')">🎭</div>
          </div>

          <h3>Confirm Handle Name</h3>
          <input id="profile-display-name" type="text" value="${localDB.users[sessionUser.uid].name}">
          
          <button class="btn" style="width:100%; margin-top:15px;" onclick="advanceToQuizWizard()">Unlock Cognitive Calibration Quiz</button>
        </div>

        <div id="setup-quiz-step" style="display:none;">
          <div class="progress-bar-container">
            <div class="progress-bar-fill" id="quiz-progress"></div>
          </div>
          <div id="quiz-window" class="quiz-container"></div>
        </div>
      `;
    }

    window.selectAvatar = function(element, char) {
      document.querySelectorAll('.avatar-selectable').forEach(el => el.classList.remove('selected'));
      element.classList.add('selected');
      selectedAvatarOnboarding = char;
    };

    window.advanceToQuizWizard = function() {
      const dName = document.getElementById('profile-display-name').value.trim();
      if(!selectedAvatarOnboarding) { alert('Select an avatar asset node.'); return; }
      if(!dName) { alert('Provide a display name.'); return; }
      
      localDB.users[sessionUser.uid].name = dName;
      localDB.users[sessionUser.uid].avatar = selectedAvatarOnboarding;
      localStorage.setItem(`userAvatar_${sessionUser.uid}`, selectedAvatarOnboarding);
      localStorage.setItem(`userName_${sessionUser.uid}`, dName);

      document.getElementById('setup-meta-step').style.display = 'none';
      document.getElementById('setup-quiz-step').style.display = 'block';
      buildQuizCoreDOM();
    };

    function buildQuizCoreDOM() {
      const container = document.getElementById('quiz-window');
      container.innerHTML = "";
      onboardingAnswers = {};

      QUESTION_DATA.forEach((question, idx) => {
        const itemDiv = document.createElement('div');
        itemDiv.className = `quiz-item ${idx === 0 ? 'active' : ''}`;
        itemDiv.id = `quiz-item-${idx}`;

        const qTitle = document.createElement('h2');
        if (question.type === 'mood') {
          qTitle.innerText = `Question ${idx + 1} of 10: ${question.q} (Select exactly 2 states)`;
        } else {
          qTitle.innerText = `Question ${idx + 1} of 10: ${question.q}`;
        }
        itemDiv.appendChild(qTitle);

        const optGrid = document.createElement('div');
        optGrid.className = "options-grid";

        question.opts.forEach((optionText, oIdx) => {
          const btn = document.createElement('button');
          btn.className = "option-btn";
          btn.innerText = optionText;
          btn.onclick = () => handleQuizSelection(idx, oIdx, btn);
          optGrid.appendChild(btn);
        });

        itemDiv.appendChild(optGrid);
        container.appendChild(itemDiv);
      });
      updateQuizProgressBar(0);
    }

    function handleQuizSelection(qIdx, oIdx, buttonElement) {
      const question = QUESTION_DATA[qIdx];
      
      if (question.type === 'mood') {
        if (!onboardingAnswers[qIdx]) onboardingAnswers[qIdx] = [];
        if (onboardingAnswers[qIdx].includes(oIdx)) return;
        
        onboardingAnswers[qIdx].push(oIdx);
        buttonElement.classList.add('selected');

        if (onboardingAnswers[qIdx].length === 2) {
          setTimeout(() => progressQuizStep(qIdx), 400);
        }
      } else {
        if (buttonElement.parentNode.querySelector('.selected')) return;
        onboardingAnswers[qIdx] = oIdx;
        buttonElement.classList.add('selected');
        setTimeout(() => progressQuizStep(qIdx), 300);
      }
    }

    function updateQuizProgressBar(currentStep) {
      document.getElementById('quiz-progress').style.width = `${(currentStep / 10) * 100}%`;
    }

    function progressQuizStep(currentIdx) {
      document.getElementById(`quiz-item-${currentIdx}`).style.display = 'none';
      const nextIdx = currentIdx + 1;
      updateQuizProgressBar(nextIdx);

      if (nextIdx < 10) {
        document.getElementById(`quiz-item-${nextIdx}`).style.display = 'block';
      } else {
        compileVectorMatrixEngine();
      }
    }

    function compileVectorMatrixEngine() {
      let finalTraitVector = [];
      let finalMoodVector = Array(8).fill(0);

      for (let i = 0; i < 9; i++) {
        const question = QUESTION_DATA[i];
        const answer = onboardingAnswers[i];
        if (question.type === 'scale') finalTraitVector.push(question.vals[answer]);
        else {
          let block = Array(question.slots).fill(0); block[answer] = 1;
          finalTraitVector = finalTraitVector.concat(block);
        }
      }
      (onboardingAnswers[9] || []).forEach(slot => finalMoodVector[slot] = 1);

      localDB.users[sessionUser.uid].traitVector = finalTraitVector;
      localDB.users[sessionUser.uid].moodVector = finalMoodVector;
      
      localStorage.setItem(`userVector_${sessionUser.uid}`, JSON.stringify({trait: finalTraitVector, mood: finalMoodVector}));
      
      alert("Profiling complete! Alignment vectors saved.");
      executeProfileUIRender();
    }

    window.saveProfileOverride = function() {
      const n = document.getElementById('edit-display-name').value.trim();
      if(n) {
        localDB.users[sessionUser.uid].name = n;
        localStorage.setItem(`userName_${sessionUser.uid}`, n);
        alert("Handle configuration updated.");
        executeProfileUIRender();
      }
    };

    window.logoutSession = async function() {
      await signOut(auth);
      sessionUser = null;
      alert('Session terminated.');
      window.location.href = 'index.html';
    };

    const glow = document.getElementById("cursor-glow"); let cX = 0, cY = 0;
    window.addEventListener("mousemove", (e) => {
      cX = e.clientX - 125; cY = e.clientY - 125;
      requestAnimationFrame(() => { glow.style.transform = `translate3d(${cX}px, ${cY}px, 0)`; });
    });
  </script>
</body>
</html>
